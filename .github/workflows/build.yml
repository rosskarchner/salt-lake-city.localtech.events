name: Build site

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install calgen
        run: pip install "calgen @ git+https://github.com/rosskarchner/calgen.git"

      - name: Build site
        run: calgen rebuild

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: build/
          retention-days: 7
